<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI calculation</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
</head>
<body class="bg-light d-flex align-items-center min-vh-100 py-4">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-4 p-md-5">
            <h2 class="text-center fw-bold mb-4">BMI Calculator</h2>

            <form>
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input id="name" type="text" class="form-control" placeholder="Enter your name" name="name">
              </div>

              <div class="mb-3">
                <label for="age" class="form-label">Age</label>
                <input id="age" type="text" class="form-control" placeholder="Enter your age" name="age">
              </div>

              <div class="mb-3">
                <label for="weight" class="form-label">Weight (kg)</label>
                <input id="weight" type="text" class="form-control" placeholder="Enter your weight in kg" name="weight">
              </div>

              <div class="mb-4">
                <label for="height" class="form-label">Height (m)</label>
                <input id="height" type="text" class="form-control" placeholder="Enter your height in meter" name="height">
              </div>

              <div class="d-grid">
                <button type="button" class="btn btn-primary btn-lg">Calculate BMI</button>
              </div>
            </form>

            <div class="alert alert-light border mt-4 mb-3" role="alert">
              <p class="mb-1">Your BMI is: <strong>--</strong></p>
              <p class="mb-0">Category: <strong>--</strong></p>
            </div>

            <h3 class="h5 mt-4 mb-3">BMI Categories</h3>
            <ul class="list-group">
              <li class="list-group-item">Below 18.5: Underweight</li>
              <li class="list-group-item">18.5 to 24.9: Normal weight</li>
              <li class="list-group-item">25.0 to 29.9: Overweight</li>
              <li class="list-group-item">30.0 and above: Obesity</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</body>
</html>
